[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_functions = test_*
addopts = -v --tb=short --strict-markers

markers =
    unit: 单函数单元测试
    integration: 模块集成测试
    api: 需要真实 API Key 的测试（跳过 CI）
    slow: 执行时间超过2秒的测试

[coverage:run]
source = .
omit =
    tests/*
    docs/*
    pipeline/templates/*
    */venv/*
    __pycache__/*

[coverage:report]
precision = 2
skip_empty = True
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
